# Configuração central de hiperparâmetros do projeto.
# Todos os módulos em src/ e app/ leem seus parâmetros daqui (via src/config.py),
# em vez de ter valores soltos espalhados pelo código.
#
# Os notebooks (notebooks/01_eda.ipynb, notebooks/02_avaliacao_qualidade.ipynb) já
# foram executados com os valores equivalentes aos listados aqui (min_reviews_genre,
# min_reviews_author, rouge_n_samples, sentiment_eval_n_samples, rag_precision_k) —
# se algum valor mudar aqui, os notebooks precisam ser re-executados para refletir.

sampling:
  target_sample_size: 200000   # tamanho alvo da amostra de reviews (de ~3M linhas)
  seed: 42

sentiment:
  # thresholds padrão do VADER para o compound score
  vader_positive_threshold: 0.05
  vader_negative_threshold: -0.05

reviewer_scoring:
  # pesos da heurística de relevância do reviewer (devem somar 1.0)
  weights:
    specificity: 0.30           # tamanho médio da review
    lexical_diversity: 0.20     # riqueza de vocabulário
    sentiment_intensity: 0.20   # intensidade do sentimento (|compound|)
    discrepancy: 0.30           # divergência vs. nota média do livro

keywords:
  min_reviews_per_genre: 500
  top_n_genres: 8
  top_n_keywords: 10
  tfidf:
    max_df: 0.9
    min_df: 1
    max_features: 20000
    ngram_range: [1, 2]

eda:
  # usados em notebooks/01_eda.ipynb para ranking "melhor avaliado"
  min_reviews_genre: 200
  min_reviews_author: 100

rag:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  collection_name: "books"
  min_reviews_per_book: 3          # elegibilidade de um livro para ser indexado
  max_review_snippets_per_book: 8  # nº de resumos de review agregados por documento
  batch_size: 256                  # tamanho do lote na indexação no ChromaDB
  default_k: 5                     # nº de documentos recuperados por busca

llm:
  groq_model: "llama-3.3-70b-versatile"
  rewrite_temperature: 0.0   # reescrita da query (determinística)
  answer_temperature: 0.2    # geração de resposta do RAG

summarization:
  max_reviews_for_summary: 40   # nº máx. de reviews usadas por chamada de resumo
  temperature: 0.2

metrics:
  rouge_n_samples: 30              # amostra p/ avaliação de sumarização (ROUGE)
  sentiment_eval_n_samples: 30     # amostra p/ avaliação VADER vs. LLM
  rag_precision_k: 5               # k usado na precisão@k do RAG

financial_impact:
  n_analysts_current: 5
  salary_month: 5000.0
  work_days_month: 22
  days_per_cycle_current: 3.0
  n_analysts_with_tool: 1.0
  days_per_cycle_with_tool: 0.5
  analyses_per_month: 4   # premissa — ajustável, ver src/financial_impact.py
