services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Job de pré-processamento: roda sob demanda (não sobe com `docker compose up`),
  # sempre que Books_rating.csv / books_data.csv mudarem.
  # Uso: docker compose run --rm pipeline
  #      docker compose run --rm pipeline python -m scripts.run_pipeline --skip-rag
  pipeline:
    build: .
    profiles: ["pipeline"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./Books_rating.csv:/app/Books_rating.csv:ro
      - ./books_data.csv:/app/books_data.csv:ro
      - hf_cache:/root/.cache/huggingface
    command: ["python", "-m", "scripts.run_pipeline"]

volumes:
  hf_cache:
